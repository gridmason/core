<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Edit-mode e2e fixture</title>
    <link rel="stylesheet" href="/node_modules/gridstack/dist/gridstack.css" />
    <!--
      Resolve the two bare specifiers the built edit-mode graph imports at
      runtime: `gridstack` (to the UMD global, see page-canvas.html) and
      `@gridmason/protocol` (the engine layer the EditController pulls in imports
      it; its dist is a self-contained ESM with no runtime deps).
    -->
    <script type="importmap">
      {
        "imports": {
          "gridstack": "data:text/javascript,export const GridStack=window.GridStack;export default window.GridStack;",
          "@gridmason/protocol": "/node_modules/@gridmason/protocol/dist/index.js"
        }
      }
    </script>
    <script src="/node_modules/gridstack/dist/gridstack-all.js"></script>
    <style>
      /* A fixed-width grid so cell math (12 columns) is deterministic for drag/resize. */
      #app { width: 1200px; }
      .grid-stack { min-height: 400px; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module">
      import { PageCanvas } from '/dist/canvas/index.js';
      import { EditController } from '/dist/canvas/index.js';

      // A vanilla test widget recording its lifecycle so remove can be proven.
      window.__lifecycle = [];
      class E2EWidget extends HTMLElement {
        connectedCallback() {
          this.style.cssText = 'display:block;height:100%;background:#eef2ff;border:1px solid #c7d2fe;';
          window.__lifecycle.push(`connected:${this.getAttribute('instance-id')}`);
        }
        disconnectedCallback() {
          window.__lifecycle.push(`disconnected:${this.getAttribute('instance-id')}`);
        }
      }
      customElements.define('gm-e2e-widget', E2EWidget);
      PageCanvas.define();

      const scopeKey = { owner: 'user', pageType: 'demo' };
      const id = { source: 'local', tag: 'gm-e2e-widget' };

      // In-memory persistence double: the spec reads back the last-put doc.
      const store = { doc: undefined, puts: 0 };
      const persistence = {
        put(_key, doc) {
          store.doc = doc;
          store.puts += 1;
        },
      };

      // Effective layouts for the two scenarios.
      const single = (items, lockedSlots = []) => ({
        layout: {
          schemaVersion: 1, page: 'demo', name: 'Demo', default: true,
          grid: { items }, hasTabs: false, tabs: [],
        },
        lockedSlots,
      });
      const item = (i, over = {}) => ({ widgetID: id, i, x: 0, y: 0, w: 3, h: 2, ...over });

      const canvas = document.createElement(PageCanvas.tagName);
      canvas.context = { record: { recordType: 'customer', id: '42' } };
      document.getElementById('app').appendChild(canvas);

      let controller;

      function build(inherited, options = {}) {
        if (controller) controller.dispose();
        store.doc = undefined;
        store.puts = 0;
        controller = new EditController({
          canvas,
          persistence,
          scopeKey,
          inherited,
          ...options,
          picker: {
            catalog: [
              { id, manifest: { tag: 'gm-e2e-widget', kind: 'widget' } },
              { id: { source: 'local', tag: 'gm-gated' }, manifest: { tag: 'gm-gated', kind: 'widget' } },
            ],
            pageType: { id: 'demo', context: {} },
            gates: { isGateOn: (q) => q.widget.tag !== 'gm-gated' },
            permissions: { hasPermissions: () => true },
          },
        });
        controller.enter();
      }

      // Default scenario: one widget, editable.
      build(single([item('w1')]));

      // Control surface the spec drives.
      window.__gm_edit = {
        // Scenario switches.
        loadDefault: () => build(single([item('w1')])),
        loadLocked: () => build(single([
          item('locked', { slot: 'header', w: 12, h: 2 }),
          item('free', { y: 2 }),
        ], ['header'])),
        loadTabbed: () => build({
          layout: {
            schemaVersion: 1, page: 'demo', name: 'Demo', default: true,
            grid: { items: [] }, hasTabs: true,
            tabs: [{ name: 'Overview', grid: { items: [item('w1')] } }],
          },
          lockedSlots: [],
        }, { allowTabs: true }),

        // Operations.
        addWidget: () => controller.addWidget({ widgetID: id }).i,
        removeWidget: (i) => controller.removeWidget(i),
        addTab: (name) => controller.addTab(name),
        renameTab: (idx, name) => controller.renameTab(idx, name),
        switchTab: (idx) => controller.switchTab(idx),
        eligibleTags: () => controller.eligibleWidgets().map((e) => e.id.tag),
        canRemove: (i) => controller.canRemove(i),
        isLocked: (i) => controller.isLocked(i),

        // Observations.
        forked: () => controller.forked,
        puts: () => store.puts,
        storedDoc: () => store.doc,
        storedItems: () => (store.doc ? store.doc.grid.items.map((it) => ({ i: it.i, x: it.x, y: it.y, w: it.w, h: it.h })) : undefined),
        storedTabItems: (idx) => (store.doc && store.doc.hasTabs ? store.doc.tabs[idx].grid.items.map((it) => it.i) : undefined),
        storedTabs: () => (store.doc && store.doc.hasTabs ? store.doc.tabs.map((t) => t.name) : undefined),
        mounted: () => canvas.mountedInstanceIds,
        geometry: (i) => canvas.geometryOf(i),
        lifecycle: () => window.__lifecycle.slice(),
        resetLog: () => { window.__lifecycle.length = 0; },
      };

      window.__gm_ready = true;
    </script>
  </body>
</html>
