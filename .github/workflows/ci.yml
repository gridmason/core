name: CI

# Runs only on main so integration (epic/**) and worker (issue/**) pushes stay
# quiet — those carry [skip ci] and open CI-free draft PRs; CI runs once when the
# batch PR lands on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build + test + lint + engine-coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # Enforces the GW-D20 engine-coverage gate: the full unit suite runs on
      # src/engine in a DOM-free node env, and the job fails if src/engine drops
      # below 100% line/branch/function/statement (see vitest.config.ts).
      - run: npm run coverage
      # Storybook is an advisory pre-1.0 harness (GW-D20). The real toolchain is
      # not installed yet; this step is the story-coverage gate — it fails if a
      # visual canvas component has no story (stories themselves type-check via
      # `npm run typecheck`, since stories/ is in tsconfig). See docs/testing.md.
      - run: npm run build-storybook
      # Playwright canvas e2e (docs/testing.md): the consolidated suite drives the
      # built canvas + real gridstack in Chromium, so Chromium must be installed
      # before the run. The webServer (playwright.config.ts) rebuilds dist and
      # serves the fixtures.
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      # Canvas-interactive perf smoke (FR-15) — a separate config/entrypoint by
      # design (perf/README.md); reuses the Chromium installed above.
      - run: npm run perf
